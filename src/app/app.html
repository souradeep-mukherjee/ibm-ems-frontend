<router-outlet />
<div class="global-loader" *ngIf="loading.isLoading()">
  <app-loading-spinner label="Working" />
</div>
<div
  class="snackbar"
  *ngIf="snackbar.message() as message"
  [class.success]="message.type === 'success'"
  [class.error]="message.type === 'error'"
  [class.info]="message.type === 'info'"
>
  {{ message.text }}
</div>
