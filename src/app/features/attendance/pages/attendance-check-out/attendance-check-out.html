<section class="card section">
    <div class="section-title">
        <h2>Check Out</h2>
    </div>

    <p class="description">
        Complete today's attendance.
    </p>

    <div class="actions">
        <app-button type="button" variant="secondary" (click)="checkOut()" [disabled]="loading()">
            {{ loading() ? 'Checking Out...' : 'Check Out' }}
        </app-button>
    </div>

    <p class="success-message" *ngIf="message()">
        {{ message() }}
    </p>

    <p class="field-error" *ngIf="error()">
        {{ error() }}
    </p>
</section>
