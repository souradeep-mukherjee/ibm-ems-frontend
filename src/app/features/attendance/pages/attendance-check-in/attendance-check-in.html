<section class="card section">
    <div class="section-title">
        <h2>Check In</h2>
    </div>

    <p class="description">
        Mark your attendance for today.
    </p>

    <div class="actions">
        <app-button type="button" (click)="checkIn()">
            {{ loading() ? 'Checking In...' : 'Check In' }}
        </app-button>
    </div>

    <p class="success-message" *ngIf="message()">
        {{ message() }}
    </p>

    <p class="field-error" *ngIf="error()">
        {{ error() }}
    </p>
</section>
