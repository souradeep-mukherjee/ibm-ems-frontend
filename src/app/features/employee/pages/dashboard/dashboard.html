<app-page-header title="Dashboard" subtitle="Operational snapshot for employee records">
  <a routerLink="/employees/create" class="create-link">Add Employee</a>
</app-page-header>

<app-skeleton *ngIf="loading()" [rows]="5" />

<section *ngIf="!loading()" class="dashboard">
  <div class="metrics">
    <article class="metric card" *ngFor="let card of cards()">
      <span>{{ card.label }}</span>
      <strong>{{ card.value }}</strong>
    </article>
  </div>

  <section class="card panel">
    <h2>Employment Type Summary</h2>
    <div class="type-row" *ngFor="let type of employmentTypes()">
      <span>{{ type[0] }}</span>
      <strong>{{ type[1] }}</strong>
    </div>
  </section>

  <section class="recent">
    <div class="section-title">
      <h2>Recent Employees</h2>
      <a routerLink="/employees">View all</a>
    </div>
    <div class="recent-grid">
      <app-employee-card *ngFor="let employee of recent()" [employee]="employee" />
    </div>
  </section>
</section>
